name: Deploy WS Worker

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-ws-worker
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout triggering commit
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'us-west-2' }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Deploy worker via update.sh
        env:
          AWS_REGION: ${{ vars.AWS_REGION || 'us-west-2' }}
          AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID || '328342419078' }}
          WORKER_INSTANCE_ID: ${{ vars.WORKER_INSTANCE_ID }}
          WORKER_SECRET_ARN: ${{ vars.WORKER_SECRET_ARN }}
          WORKER_DNS_RECORD: ${{ vars.WORKER_DNS_RECORD }}
          AUTO_APPROVE: "true"
          TF_INPUT: "false"
        run: bash ./scripts/update.sh
