name: Publish Smart Deploy CLI Beta

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-beta
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm run cli:build
      - run: npm --prefix packages/cli run pack:dry-run
      - working-directory: packages/cli
        run: npm publish --access public --tag beta --provenance
