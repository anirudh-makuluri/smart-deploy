version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartdeploy-app
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # OAuth
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GITHUB_ID=${GITHUB_ID}
      - GITHUB_SECRET=${GITHUB_SECRET}
      # NextAuth
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      # GCP
      - GCP_PROJECT_ID=${GCP_PROJECT_ID}
      - GCP_SERVICE_ACCOUNT_KEY=${GCP_SERVICE_ACCOUNT_KEY}
      # AWS
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-us-west-2}
      - EC2_ACM_CERTIFICATE_ARN=${EC2_ACM_CERTIFICATE_ARN}
      # LLM / environment
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - LOCAL_LLM_BASE_URL=${LOCAL_LLM_BASE_URL}
      - LOCAL_LLM_MODEL=${LOCAL_LLM_MODEL}
      - BEDROCK_MODEL_ID=${BEDROCK_MODEL_ID}
      - USE_CODEBUILD=${USE_CODEBUILD}
      - DOCKERHUB_USERNAME=${DOCKERHUB_USERNAME}
      - DOCKERHUB_TOKEN=${DOCKERHUB_TOKEN}
      # AWS Bedrock
      - AWS_BEDROCK_ACCESS_KEY_ID=${AWS_BEDROCK_ACCESS_KEY_ID}
      - AWS_BEDROCK_SECRET_ACCESS_KEY=${AWS_BEDROCK_SECRET_ACCESS_KEY}
      # Supabase
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - DEPLOYMENT_SCREENSHOT_BUCKET=${DEPLOYMENT_SCREENSHOT_BUCKET}
      # Deployment targets
      - NEXT_PUBLIC_DEPLOYMENT_DOMAIN=${NEXT_PUBLIC_DEPLOYMENT_DOMAIN}
      - NEXT_PUBLIC_VERCEL_DOMAIN=${NEXT_PUBLIC_VERCEL_DOMAIN}
      - VERCEL_DOMAIN=${VERCEL_DOMAIN}
      - VERCEL_TOKEN=${VERCEL_TOKEN}
      # WebSocket
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL}
    networks:
      - smartdeploy-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => {process.exit(r.statusCode === 200 || r.statusCode === 302 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  websocket:
    build:
      context: .
      dockerfile: Dockerfile.websocket
    container_name: smartdeploy-websocket
    restart: unless-stopped
    env_file: .env
    ports:
      - "4001:4001"
    environment:
      - NODE_ENV=production
      - NODE_OPTIONS=--max-old-space-size=2048
      # OAuth
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GITHUB_ID=${GITHUB_ID}
      - GITHUB_SECRET=${GITHUB_SECRET}
      # NextAuth
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      # GCP
      - GCP_PROJECT_ID=${GCP_PROJECT_ID}
      - GCP_SERVICE_ACCOUNT_KEY=${GCP_SERVICE_ACCOUNT_KEY}
      # AWS
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-us-west-2}
      - EC2_ACM_CERTIFICATE_ARN=${EC2_ACM_CERTIFICATE_ARN}
      # LLM / environment
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - LOCAL_LLM_BASE_URL=${LOCAL_LLM_BASE_URL}
      - LOCAL_LLM_MODEL=${LOCAL_LLM_MODEL}
      - BEDROCK_MODEL_ID=${BEDROCK_MODEL_ID}
      # AWS Bedrock
      - AWS_BEDROCK_ACCESS_KEY_ID=${AWS_BEDROCK_ACCESS_KEY_ID}
      - AWS_BEDROCK_SECRET_ACCESS_KEY=${AWS_BEDROCK_SECRET_ACCESS_KEY}
      # Deployment targets
      - NEXT_PUBLIC_DEPLOYMENT_DOMAIN=${NEXT_PUBLIC_DEPLOYMENT_DOMAIN}
      - NEXT_PUBLIC_VERCEL_DOMAIN=${NEXT_PUBLIC_VERCEL_DOMAIN}
      - VERCEL_DOMAIN=${VERCEL_DOMAIN}
      - VERCEL_TOKEN=${VERCEL_TOKEN}
      # WebSocket
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL}
      - WS_PORT=${WS_PORT:-4001}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - smartdeploy-network

networks:
  smartdeploy-network:
    driver: bridge
